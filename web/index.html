<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCR UVT - Reconnaissance Optique de Caractères</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
            padding: 30px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            color: #2c3e50;
            font-weight: 700;
        }
        .api-status {
            text-align: center;
            margin-bottom: 20px;
        }
        .status-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            font-weight: 500;
        }
        .status-ok {
            background-color: #d4edda;
            color: #155724;
        }
        .status-error {
            background-color: #f8d7da;
            color: #721c24;
        }
        .upload-area {
            border: 2px dashed #ced4da;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }
        .upload-area:hover {
            border-color: #0d6efd;
            background-color: #f8f9fa;
        }
        .result-area {
            margin-top: 20px;
            display: none;
        }
        .result-text {
            white-space: pre-wrap;
            word-wrap: break-word;
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            max-height: 400px;
            overflow-y: auto;
        }
        .language-select {
            margin-bottom: 20px;
        }
        .btn-primary {
            background-color: #0d6efd;
            border-color: #0d6efd;
        }
        .spinner-border {
            display: none;
        }
        .error-message {
            display: none;
            color: #dc3545;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>OCR UVT - Reconnaissance Optique de Caractères</h1>
            <p class="text-muted">Version 4.0</p>
        </div>
        
        <div class="api-status">
            <span>État de l'API: </span>
            <span id="api-status" class="status-badge">Vérification en cours...</span>
        </div>
        
        <div class="language-select">
            <label for="language" class="form-label">Langue de reconnaissance:</label>
            <select id="language" class="form-select">
                <option value="eng+fra+ara">Français, Arabe et Anglais</option>
                <option value="eng+fra">Français et Anglais</option>
                <option value="eng+ara">Arabe et Anglais</option>
                <option value="fra+ara">Français et Arabe</option>
                <option value="fra">Français uniquement</option>
                <option value="ara">Arabe uniquement</option>
                <option value="eng">Anglais uniquement</option>
            </select>
        </div>
        
        <div class="upload-area" id="drop-area">
            <input type="file" id="file-input" accept="image/*" style="display: none;">
            <p>Glissez-déposez une image ici ou <a href="#" id="file-link">cliquez pour sélectionner</a></p>
            <p class="text-muted">Formats supportés: JPG, PNG, BMP, TIFF</p>
        </div>
        
        <div class="text-center">
            <button id="process-btn" class="btn btn-primary" disabled>Traiter l'image</button>
            <div class="spinner-border text-primary" role="status" id="spinner">
                <span class="visually-hidden">Chargement...</span>
            </div>
        </div>
        
        <div class="error-message" id="error-message"></div>
        
        <div class="result-area" id="result-area">
            <h3>Résultat de l'OCR:</h3>
            <div class="result-text" id="result-text"></div>
            <div class="mt-3">
                <button id="copy-btn" class="btn btn-outline-secondary">Copier le texte</button>
                <button id="clear-btn" class="btn btn-outline-secondary">Effacer</button>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // API status check
        fetch('/api/health')
            .then(response => response.json())
            .then(data => {
                const statusElement = document.getElementById('api-status');
                statusElement.textContent = 'En ligne';
                statusElement.classList.add('status-ok');
            })
            .catch(error => {
                const statusElement = document.getElementById('api-status');
                statusElement.textContent = 'Hors ligne';
                statusElement.classList.add('status-error');
            });
        
        // File upload handling
        const dropArea = document.getElementById('drop-area');
        const fileInput = document.getElementById('file-input');
        const fileLink = document.getElementById('file-link');
        const processBtn = document.getElementById('process-btn');
        const spinner = document.getElementById('spinner');
        const resultArea = document.getElementById('result-area');
        const resultText = document.getElementById('result-text');
        const errorMessage = document.getElementById('error-message');
        const copyBtn = document.getElementById('copy-btn');
        const clearBtn = document.getElementById('clear-btn');
        const languageSelect = document.getElementById('language');
        
        let selectedFile = null;
        
        // Prevent default drag behaviors
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropArea.addEventListener(eventName, preventDefaults, false);
        });
        
        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }
        
        // Highlight drop area when item is dragged over it
        ['dragenter', 'dragover'].forEach(eventName => {
            dropArea.addEventListener(eventName, highlight, false);
        });
        
        ['dragleave', 'drop'].forEach(eventName => {
            dropArea.addEventListener(eventName, unhighlight, false);
        });
        
        function highlight() {
            dropArea.classList.add('border-primary');
        }
        
        function unhighlight() {
            dropArea.classList.remove('border-primary');
        }
        
        // Handle dropped files
        dropArea.addEventListener('drop', handleDrop, false);
        
        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            handleFiles(files);
        }
        
        // Handle file input change
        fileInput.addEventListener('change', function() {
            handleFiles(this.files);
        });
        
        // Handle file link click
        fileLink.addEventListener('click', function(e) {
            e.preventDefault();
            fileInput.click();
        });
        
        function handleFiles(files) {
            if (files.length > 0) {
                selectedFile = files[0];
                dropArea.innerHTML = `<p>Fichier sélectionné: <strong>${selectedFile.name}</strong></p>
                <p class="text-muted">Taille: ${formatFileSize(selectedFile.size)}</p>`;
                processBtn.disabled = false;
            }
        }
        
        function formatFileSize(bytes) {
            if (bytes < 1024) {
                return bytes + ' octets';
            } else if (bytes < 1024 * 1024) {
                return (bytes / 1024).toFixed(2) + ' Ko';
            } else {
                return (bytes / (1024 * 1024)).toFixed(2) + ' Mo';
            }
        }
        
        // Process button click
        processBtn.addEventListener('click', processImage);
        
        function processImage() {
            if (!selectedFile) return;
            
            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('language', languageSelect.value);
            
            // Show spinner, hide error
            spinner.style.display = 'inline-block';
            errorMessage.style.display = 'none';
            processBtn.disabled = true;
            
            fetch('/api/ocr', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                spinner.style.display = 'none';
                processBtn.disabled = false;
                
                if (data.success) {
                    resultText.textContent = data.text;
                    resultArea.style.display = 'block';
                } else {
                    errorMessage.textContent = 'Erreur lors du traitement de l'image.';
                    errorMessage.style.display = 'block';
                }
            })
            .catch(error => {
                spinner.style.display = 'none';
                processBtn.disabled = false;
                errorMessage.textContent = `Erreur: ${error.message}`;
                errorMessage.style.display = 'block';
            });
        }
        
        // Copy button click
        copyBtn.addEventListener('click', function() {
            navigator.clipboard.writeText(resultText.textContent)
                .then(() => {
                    const originalText = copyBtn.textContent;
                    copyBtn.textContent = 'Copié!';
                    setTimeout(() => {
                        copyBtn.textContent = originalText;
                    }, 2000);
                })
                .catch(err => {
                    console.error('Erreur lors de la copie: ', err);
                });
        });
        
        // Clear button click
        clearBtn.addEventListener('click', function() {
            resultText.textContent = '';
            resultArea.style.display = 'none';
            dropArea.innerHTML = `<input type="file" id="file-input" accept="image/*" style="display: none;">
            <p>Glissez-déposez une image ici ou <a href="#" id="file-link">cliquez pour sélectionner</a></p>
            <p class="text-muted">Formats supportés: JPG, PNG, BMP, TIFF</p>`;
            
            // Re-attach event listeners
            document.getElementById('file-input').addEventListener('change', function() {
                handleFiles(this.files);
            });
            document.getElementById('file-link').addEventListener('click', function(e) {
                e.preventDefault();
                document.getElementById('file-input').click();
            });
            
            selectedFile = null;
            processBtn.disabled = true;
        });
    </script>
</body>
</html>
